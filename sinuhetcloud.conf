[app]
name = "airoom"
description = "Autonomous RPG Negotiation Simulator — LLM agents negotiate without human intervention"
port = 8091

[scripts]
install = "python3 -m venv .venv && .venv/bin/pip install -r requirements.txt"
start = ".venv/bin/uvicorn web:app --host 0.0.0.0 --port ${PORT}"
update = "git pull && .venv/bin/pip install -r requirements.txt"
uninstall = "rm -rf .venv sessions"
